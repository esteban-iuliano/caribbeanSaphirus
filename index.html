const MODO_DEMO = !APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("TU_URL");

async function apiCall(accion, datos = {}) {
  if (MODO_DEMO) return null;
  // Usamos text/plain para evitar el preflight CORS que bloquea Apps Script
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ accion, ...datos }),
    redirect: "follow"
  });
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error("Respuesta inválida del servidor: " + text.substring(0,100)); }
  if (!json.ok) throw new Error(json.error || "Error en servidor");
  return json.data;
}

function ResultadoScreen({resultado, clienteOriginal, onConfirmar, onBack}) {
  const [items, setItems] = useState(resultado?.items||[]);
  const [confirmando, setConfirmando] = useState(false);
  const [confirmado, setConfirmado] = useState(false);

  if(!resultado) return null;

  const total = items.reduce((s,i)=>s+(parseInt(i.cantidad)||0),0);
  const itemsNuevos = items.filter(i=>i.flag==="NUEVA"||i.flag==="REVISAR");

  const cambiarCantidad = (idx,delta) => {
    setItems(prev=>prev.map((it,i)=>i===idx?{...it,cantidad:Math.max(0,(it.cantidad||0)+delta)}:it));
  };
  const eliminar = (idx) => setItems(prev=>prev.filter((_,i)=>i!==idx));

  const confirmar = async () => {
    setConfirmando(true);
    await new Promise(r=>setTimeout(r,1200));
    setConfirmando(false);
    setConfirmado(true);
    setTimeout(()=>onConfirmar({...resultado,items,total_unidades:total}),900);
  };

    <div style={{display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",minHeight:"70vh",padding:"0 24px",textAlign:"center"}}>

      <p style={{color:"#64748b",fontSize:15}}>{resultado.cliente_detectado} — {total} unidades</p>
      <p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>Guardado en Google Sheets</p>
    </div>
  );

  return (
    <div style={{padding:"0 16px 120px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 16px"}}>
        <button onClick={onBack} style={{

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#166534",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>
              Cliente · Confianza {resultado.confianza_cliente}
            </div>
            <div style={{fontSize:18,fontWeight:800,color:"#0f172a",marginTop:2}}>
              {resultado.cliente_detectado}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{resultado.cliente_id}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:32,fontWeight:800,color:"#1e3a5f"}}>{total}</div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>UNIDADES</div>
          </div>
        </div>
        {resultado.notas_pedido && (
          <div style={{marginTop:10,padding:"8px 12px",background:"#fefce8",borderRadius:8,fontSize:12,color:"#92400e"}}>
            📝 {resultado.notas_pedido}
          </div>
        )}
      </Card>

      {itemsNuevos.length>0 && (
        <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:12,
          padding:"12px 14px",marginBottom:16,fontSize:13,color:"#9a3412"}}>
          ⚠️ <strong>{itemsNuevos.length} ítem{itemsNuevos.length>1?"s":""} para revisar:</strong>{" "}
          {resultado.items_a_revisar?.join(", ")}
        </div>
      )}

      <h3 style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>
        Items del pedido
      </h3>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {items.map((item,idx)=>{
          const fc = FLAG_CONFIG[item.flag]||FLAG_CONFIG.OK;
          return (
            <div key={idx} style={{
              background:"#fff",borderRadius:12,padding:"12px 14px",
              boxShadow:"0 1px 3px rgba(0,0,0,0.07)",
              borderLeft:`4px solid ${fc.color}`,
              display:"flex",alignItems:"center",gap:10
            }}>
              <span style={{background:fc.bg,color:fc.color,padding:"2px 7px",borderRadius:6,
                fontSize:10,fontWeight:700,flexShrink:0,minWidth:46,textAlign:"center"}}>
                {fc.label}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#0f172a",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {item.fragancia}
                </div>
                {item.alias_usado && (
                  <div style={{fontSize:10,color:"#94a3b8"}}>"{item.alias_usado}"</div>
                )}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                {[
                  {txt:"−",fn:()=>cambiarCantidad(idx,-1)},
                ].map(({txt,fn})=>(
                  <button key={txt} onClick={fn} style={{
                    width:28,height:28,borderRadius:8,border:"1.5px solid #e2e8f0",
                    background:"#f8fafc",cursor:"pointer",fontSize:16,fontWeight:700,
                    display:"flex",alignItems:"center",justifyContent:"center",color:"#374151"
                  }}>{txt}</button>
                ))}
                <span style={{fontWeight:800,fontSize:16,minWidth:24,textAlign:"center",color:"#0f172a"}}>
                  {item.cantidad}
                </span>
                <button onClick={()=>cambiarCantidad(idx,1)} style={{
                  width:28,height:28,borderRadius:8,border:"1.5px solid #e2e8f0",
                  background:"#f8fafc",cursor:"pointer",fontSize:16,fontWeight:700,
                  display:"flex",alignItems:"center",justifyContent:"center",color:"#374151"
                }}>+</button>
                <button onClick={()=>eliminar(idx)} style={{
                  width:28,height:28,borderRadius:8,border:"none",
                  background:"#fee2e2",cursor:"pointer",fontSize:13,
                  display:"flex",alignItems:"center",justifyContent:"center",color:"#dc2626"
                }}>✕</button>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn onClick={confirmar} disabled={confirmando} variant="secondary">
          {confirmando?"⏳ Guardando...": `✅ Confirmar (${total} unidades)`}
        </Btn>
        <Btn onClick={onBack} variant="ghost">← Volver a editar</Btn>
      </div>
    </div>
  );
}

// HISTORIAL
function HistorialScreen({pedidos, onVerPedido}) {
  return (
    <div style={{padding:"0 16px 100px"}}>
      <div style={{padding:"24px 0 20px"}}>
        <h1 style={{fontSize:24,fontWeight:800,color:"#0f172a",margin:0}}>Historial</h1>
        <p style={{fontSize:13,color:"#94a3b8",margin:"4px 0 0"}}>{pedidos.length} pedidos</p>
      </div>
      {pedidos.length===0 ? (
        <div style={{textAlign:"center",padding:"48px 0",color:"#94a3b8"}}>
          <div style={{fontSize:48,marginBottom:12}}>📂</div>
          <p style={{fontWeight:700}}>Sin historial todavía</p>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {pedidos.map(p=><PedidoCard key={p.id} pedido={p} onClick={()=>onVerPedido(p)}/>)}
        </div>
      )}
    </div>
  );
}

// APP PRINCIPAL
function App() {
  const [pantalla, setPantalla] = useState("home");
  const [pedidos, setPedidos] = useState([]);
  const [resultadoActual, setResultadoActual] = useState(null);
  const [clienteActual, setClienteActual] = useState(null);

  const handleResultado = (r, c) => { setResultadoActual(r); setClienteActual(c); setPantalla("resultado"); };

  const handleConfirmar = async (pf) => {
    try {
      // Guardar en Google Sheets via Apps Script
      const r = await callGuardarPedido({
        ...pf,
        mensaje_original: pf.mensaje_original || ""
      });
      // Agregar a la lista local con el ID real de Sheets
      setPedidos(prev=>[{
        id: r?.id_pedido || `PED-${String(prev.length+1).padStart(3,"0")}`,
        clienteId:pf.cliente_id, clienteNombre:pf.cliente_detectado,
        estado:"CONFIRMADO", totalUnidades:pf.total_unidades,
        fecha:new Date().toLocaleString("es-AR",{dateStyle:"short",timeStyle:"short"}),
        canal:clienteActual?.canal||"DIRECTO",
        requiereRevision:false, items:pf.items,
      },...prev]);
      setTimeout(()=>setPantalla("home"),1200);
    } catch(e) {
      alert("Error al guardar en Sheets: " + e.message);
    }
  };

  const navItems = [
    {id:"home",     icon:"🏠", label:"Inicio"},
    {id:"historial",icon:"📋", label:"Historial"},
  ];

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f8fafc",
      fontFamily:"'Sora',system-ui,sans-serif",position:"relative"}}>

      {/* Top bar */}
      <div style={{
        position:"sticky",top:0,zIndex:50,
        background:"rgba(248,250,252,0.94)",backdropFilter:"blur(12px)",
        borderBottom:"1px solid #f1f5f9",padding:"10px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{
            width:32,height:32,borderRadius:10,
            background:"linear-gradient(135deg,#1e3a5f,#f97316)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16
          }}>🌊</div>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:"#0f172a",lineHeight:1}}>Caribbean</div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>Saphirus · Pedidos</div>
          </div>
        </div>
        <div style={{background:"#f0fdf4",color:"#166534",padding:"4px 10px",
          borderRadius:99,fontSize:11,fontWeight:700}}>● En línea</div>
      </div>

      {/* Contenido */}
      {pantalla==="home" && (
        <HomeScreen pedidos={pedidos} onNuevo={()=>setPantalla("nuevo")}
          onVerPedido={p=>{setResultadoActual({
            cliente_detectado:p.clienteNombre,cliente_id:p.clienteId,
            confianza_cliente:"ALTA",items:p.items,
            total_unidades:p.totalUnidades,items_a_revisar:[]
          });setPantalla("resultado");}}/>
      )}
      {pantalla==="nuevo" && (
        <NuevoPedidoScreen onBack={()=>setPantalla("home")} onResultado={handleResultado}/>
      )}
      {pantalla==="resultado" && (
        <ResultadoScreen resultado={resultadoActual} clienteOriginal={clienteActual}
          onConfirmar={handleConfirmar} onBack={()=>setPantalla("nuevo")}/>
      )}
      {pantalla==="historial" && (
        <HistorialScreen pedidos={pedidos} onVerPedido={()=>{}}/>
      )}

      {/* Bottom Nav */}
      {(pantalla==="home"||pantalla==="historial") && (
        <div style={{
          position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
          width:"100%",maxWidth:430,
          background:"rgba(255,255,255,0.96)",backdropFilter:"blur(16px)",
          borderTop:"1px solid #f1f5f9",padding:"8px 24px 24px",
          display:"flex",justifyContent:"space-around",alignItems:"center",zIndex:50
        }}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setPantalla(item.id)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              background:pantalla===item.id?"#fff7ed":"transparent",
              border:"none",cursor:"pointer",padding:"6px 20px",borderRadius:12
            }}>
              <span style={{fontSize:20}}>{item.icon}</span>
              <span style={{fontSize:11,fontWeight:700,
                color:pantalla===item.id?"#f97316":"#94a3b8"}}>{item.label}</span>
            </button>
          ))}
          <button onClick={()=>setPantalla("nuevo")} style={{
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,
            background:"linear-gradient(135deg,#1e3a5f,#f97316)",
            border:"none",cursor:"pointer",padding:"10px 24px",
            borderRadius:14,boxShadow:"0 4px 14px rgba(249,115,22,0.4)"
          }}>
            <span style={{fontSize:18}}>➕</span>
            <span style={{fontSize:11,fontWeight:700,color:"#fff"}}>Pedido</span>
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
