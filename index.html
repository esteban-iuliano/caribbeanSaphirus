// COMPRIMIR IMAGEN
function compressImage(file, maxDimension = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      let { width, height } = img;
      if (width > maxDimension || height > maxDimension) {
        if (width > height) { height = Math.round((height * maxDimension) / width); width = maxDimension; }
        else { width = Math.round((width * maxDimension) / height); height = maxDimension; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result.split(",")[1];
          const sizeKB = Math.round(blob.size / 1024);
          resolve({ base64, mimeType: "image/jpeg", sizeKB });
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      }, "image/jpeg", quality);
    };
    img.onerror = reject;
    img.src = objectUrl;
  });
}

// API
const MODO_DEMO = !APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("TU_URL");

async function apiCall(accion, datos = {}) {
  if (MODO_DEMO) return null;
  const payload = encodeURIComponent(JSON.stringify({ accion, ...datos }));
  const url = APPS_SCRIPT_URL + "?datos=" + payload;
  const res = await fetch(url, { redirect: "follow" });
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error("Respuesta invalida: " + text.substring(0,200)); }
  if (!json.ok) throw new Error(json.error || "Error en servidor");
  return json.data;
}

async function apiCallPost(accion, datos = {}) {
  if (MODO_DEMO) return null;
  const payload = JSON.stringify({ accion, ...datos });
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST", headers: { "Content-Type": "text/plain" },
    body: payload, redirect: "follow",
  });
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error("Respuesta invalida: " + text.substring(0,200)); }
  if (!json.ok) throw new Error(json.error || "Error en servidor");
  return json.data;
}

// WHATSAPP
function generarTextoWhatsApp(clienteNombre, items) {
  const grupos = {};
  (items || []).forEach(it => {
    const p = it.producto || "Aromatizador Textil 250ml";
    if (!grupos[p]) grupos[p] = [];
    grupos[p].push(it);
  });
  const fecha = new Date().toLocaleDateString("es-AR", { day:"2-digit", month:"2-digit", year:"numeric" });
  let lines = [];
  lines.push("🌊 *Caribbean Saphirus*");
  lines.push("📦 *" + clienteNombre + "*");
  lines.push("📅 " + fecha);
  lines.push("");
  let totalGeneral = 0;
  Object.entries(grupos).forEach(([producto, its]) => {
    const icono = getProdStyle(producto).icon;
    const totalProducto = its.reduce((s, it) => s + (parseInt(it.cantidad) || 0), 0);
    totalGeneral += totalProducto;
    lines.push(icono + " *" + producto + "* — " + totalProducto + " u");
    its.forEach(it => { lines.push("  • " + it.fragancia + " · " + it.cantidad + " u"); });
    lines.push("");
  });
  lines.push("📊 *Total: " + totalGeneral + " unidades*");
  lines.push("✅ ¡Pedido listo!");
  return lines.join("\n");
}

function abrirWhatsApp(clienteNombre, items) {
  const texto = generarTextoWhatsApp(clienteNombre, items);
  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
}

const Card = ({children, style, onClick}) => (

    background:"#fff", borderRadius:16, padding:"16px",
    boxShadow:"0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04)",

    onTouchEnd={e => onClick && (e.currentTarget.style.transform="scale(1)")}
  >{children}</div>
);

const Btn = ({children, onClick, variant="primary", disabled, style}) => {
  const s = {
    primary:  {background:"#f97316", color:"#fff", border:"none"},
    secondary:{background:"#1e3a5f", color:"#fff", border:"none"},
    ghost:    {background:"transparent", color:"#64748b", border:"1.5px solid #e2e8f0"},
  };
  return <button onClick={onClick} disabled={disabled} style={{
    ...s[variant], padding:"14px 20px", borderRadius:12, fontSize:15,
    fontWeight:700, cursor:disabled?"not-allowed":"pointer",
    opacity:disabled?0.5:1, fontFamily:"inherit",

};

  const [imagenData,    setImagenData]    = useState(null);
  const [imagenPreview, setImagenPreview] = useState(null);
  const [imagenStatus,  setImagenStatus]  = useState("");
  const fileInputRef    = useRef(null);
  const galeriaInputRef = useRef(null);

  useEffect(() => {
    return () => { if (imagenPreview) URL.revokeObjectURL(imagenPreview); };
  }, [imagenPreview]);

  const filtrados = CLIENTES.filter(c=>
    c.nombre.toLowerCase().includes(busqueda.toLowerCase()) ||
    c.vendedor.toLowerCase().includes(busqueda.toLowerCase())
  );

  const handleImagenSelect = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (imagenPreview) URL.revokeObjectURL(imagenPreview);
    setImagenPreview(URL.createObjectURL(file));
    setImagenStatus("comprimiendo...");
    setImagenData(null); setMensaje("");
    try {
      const { base64, mimeType, sizeKB } = await compressImage(file);
      setImagenData({ base64, mimeType });
      setImagenStatus("listo · " + sizeKB + " KB");
    } catch (err) {
      setImagenStatus("error al comprimir");
    }
    e.target.value = "";
  };

  const quitarImagen = () => {
    if (imagenPreview) URL.revokeObjectURL(imagenPreview);
    setImagenPreview(null); setImagenData(null); setImagenStatus("");
  };

  const procesar = async () => {
    setCargando(true);
    try {
      let r;
      if (imagenData) {
        r = await callParserImagen(imagenData.base64, imagenData.mimeType, cliente?.id);
      } else {
        r = await callParser(mensaje, cliente?.id);
      }
      onResultado(r, cliente);
    } catch(e) {
      alert("Error al procesar. Revisa la conexion e intenta de nuevo.\n\n" + e.message);
    } finally {
      setCargando(false);
    }
  };

  const puedeEnviar = !cargando && (imagenData !== null || mensaje.trim() !== "");
  const grupos = [
    {vendedor:"German", label:"🏪 Chinos — German"},
    {vendedor:"Pepe",   label:"🛵 Clientes — Pepe"},
  ];

  return (
    <div style={{padding:"0 16px 100px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 20px"}}>
        <button onClick={onBack} style={{background:"#f1f5f9",border:"none",borderRadius:10,
          width:36,height:36,cursor:"pointer",fontSize:18,
          display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:0}}>Nuevo pedido</h1>
          <p style={{fontSize:12,color:"#94a3b8",margin:0}}>
            Paso {paso} de 2 — {paso===1?"Elegi el cliente":"Pega el pedido o saca una foto"}
          </p>
        </div>
      </div>

      {paso===1 && (
        <div>
          <input placeholder="🔍  Buscar cliente..." value={busqueda}
            onChange={e=>setBusqueda(e.target.value)}
            style={{width:"100%",padding:"14px 16px",borderRadius:12,fontSize:15,
              border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#0f172a",
              fontFamily:"inherit",boxSizing:"border-box",marginBottom:20,outline:"none"}}
          />
          {grupos.map(({vendedor,label}) => {
            const grupo = filtrados.filter(c=>c.vendedor===vendedor);
            if(!grupo.length) return null;
            return (
              <div key={vendedor} style={{marginBottom:20}}>
                <h3 style={{fontSize:11,fontWeight:700,color:"#94a3b8",
                  textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{label}</h3>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {grupo.map(c=>(
                    <Card key={c.id} onClick={()=>{setCliente(c);setPaso(2);}} style={{padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontWeight:700,fontSize:15,color:"#0f172a"}}>{c.nombre}</span>
                        <span style={{fontSize:20,color:"#cbd5e1"}}>›</span>
                      </div>
                      <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{c.id}</div>
                    </Card>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {paso===2 && (
        <div>
          <Card style={{marginBottom:16,background:"#f0f9ff",border:"1.5px solid #bae6fd"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,color:"#0369a1",fontWeight:700,textTransform:"uppercase"}}>
                  Cliente seleccionado
                </div>
                <div style={{fontSize:17,fontWeight:800,color:"#0f172a",marginTop:2}}>{cliente?.nombre}</div>
              </div>
              <button onClick={()=>setPaso(1)} style={{background:"#e0f2fe",border:"none",
                borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,
                color:"#0369a1",cursor:"pointer"}}>Cambiar</button>
            </div>
          </Card>

          <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
            style={{display:"none"}} onChange={handleImagenSelect} />
          <input ref={galeriaInputRef} type="file" accept="image/*"
            style={{display:"none"}} onChange={handleImagenSelect} />

          {!imagenPreview && (
            <button onClick={() => galeriaInputRef.current.click()} disabled={cargando}
              style={{width:"100%",padding:"14px",borderRadius:12,border:"1.5px dashed #94a3b8",
                background:"#f8fafc",cursor:"pointer",fontSize:15,fontWeight:700,color:"#64748b",
                marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                fontFamily:"inherit"}}>
              📷 Subir foto del pedido
            </button>
          )}

          {imagenPreview && (
            <div style={{position:"relative",marginBottom:12,borderRadius:12,
              overflow:"hidden",border:"1.5px solid #e2e8f0"}}>
              <img src={imagenPreview} alt="Foto del pedido"
                style={{width:"100%",display:"block",maxHeight:220,objectFit:"cover"}}/>
              <div style={{position:"absolute",bottom:0,left:0,right:0,
                background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,fontWeight:700,
                padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>
                  {imagenStatus === "comprimiendo..." ? "⏳ Comprimiendo..."
                    : imagenStatus.startsWith("error") ? "❌ " + imagenStatus
                    : "✅ Imagen lista · " + imagenStatus}
                </span>
                <button onClick={quitarImagen} style={{background:"rgba(255,255,255,0.2)",
                  border:"none",borderRadius:6,color:"#fff",fontWeight:700,
                  fontSize:12,cursor:"pointer",padding:"3px 10px"}}>✕ Quitar</button>
              </div>
            </div>
          )}

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,opacity:imagenData?0.4:1}}>
            <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
            <span style={{fontSize:11,fontWeight:700,color:"#94a3b8"}}>
              {imagenData ? "o agrega texto adicional (opcional)" : "o escribe el pedido"}
            </span>
            <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
          </div>

          <label style={{fontSize:13,fontWeight:700,color:"#374151",display:"block",marginBottom:8}}>
            Texto del pedido
          </label>
          <textarea value={mensaje} onChange={e=>setMensaje(e.target.value)}
            placeholder={"Pega el WhatsApp, transcripcion del audio, o escribe el pedido.\n\nEjemplo:\nLavanda-6, Lola-6, Mery-3, banilla-5, chicle-6..."}
            rows={imagenData ? 3 : 9} disabled={cargando}
            style={{width:"100%",padding:"14px",borderRadius:12,fontSize:14,
              border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#0f172a",
              fontFamily:"inherit",boxSizing:"border-box",resize:"vertical",
              lineHeight:1.6,outline:"none",marginBottom:12,opacity:cargando?0.5:1}}
          />

          <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,
            padding:"10px 14px",marginBottom:20,fontSize:12,color:"#92400e"}}>
            💡 <strong>Tip:</strong> Podes sacar una foto del papel con el pedido, o pegar el texto del WhatsApp.
          </div>

          <Btn onClick={procesar} disabled={!puedeEnviar}>
            {cargando ? (imagenData ? "⏳ Claude analiza la imagen..." : "⏳ Claude procesa...") : "✨ Procesar pedido"}
          </Btn>

          {cargando && (
            <div style={{textAlign:"center",marginTop:20,color:"#94a3b8",fontSize:13}}>
              <div style={{fontSize:32,marginBottom:8}}>🤖</div>
              {imagenData ? "Leyendo la imagen y detectando fragancias..." : "Interpretando fragancias, aliases y cantidades..."}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  RESULTADO — con editor inline (tap para expandir)
// ═══════════════════════════════════════════════════════
function ResultadoScreen({resultado, clienteOriginal, onConfirmar, onBack}) {
  const [items, setItems] = useState(() =>
    (resultado?.items || []).map(it => ({
      ...it,
      _aliasOriginal: it.fragancia,
      _aliasPendiente: false,
    }))
  );
  const [confirmando, setConfirmando] = useState(false);
  const [confirmado,  setConfirmado]  = useState(false);
  const [toast,       setToast]       = useState(null);
  const [expandedIdx, setExpandedIdx] = useState(null);  // indice del item expandido

  if(!resultado) return null;

  const total = items.reduce((s,i) => s + (parseInt(i.cantidad)||0), 0);
  const itemsNuevos = items.filter(i => i.flag==="NUEVA" || i.flag==="REVISAR");

  const mostrarToast = (msg, tipo="ok") => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 3500);
  };

  // Cantidad
  const cambiarCantidad = (idx, delta) => {
    setItems(prev => prev.map((it,i) =>
      i===idx ? {...it, cantidad: Math.max(0, (it.cantidad||0)+delta)} : it
    ));
  };

  // Eliminar — corrige expandedIdx si hace falta
  const eliminar = (idx) => {
    setItems(prev => prev.filter((_,i) => i !== idx));
    setExpandedIdx(cur =>
      cur === null ? null :
      cur === idx  ? null :
      cur > idx    ? cur - 1 : cur
    );
  };

  // Fragancia
  const editarFragancia = (idx, nuevaFragancia) => {
    setItems(prev => prev.map((it, i) => {
      if (i !== idx) return it;
      const cambio = nuevaFragancia.trim() !== "" && nuevaFragancia.trim() !== it._aliasOriginal;
      return { ...it, fragancia: nuevaFragancia, _aliasPendiente: cambio };
    }));
  };

  // Producto
  const editarProducto = (idx, nuevoProducto) => {
    setItems(prev => prev.map((it, i) => i === idx ? {...it, producto: nuevoProducto} : it));
  };

  // Flag / Estado
  const editarFlag = (idx, nuevaFlag) => {
    setItems(prev => prev.map((it, i) => i === idx ? {...it, flag: nuevaFlag} : it));
  };

  // Agregar item manual — lo abre expandido automaticamente
  const agregarItem = () => {
    const nuevoItem = {
      fragancia: "",
      cantidad: 1,
      producto: resultado?.producto_default || "Aromatizador Textil 250ml",
      flag: "NUEVA",
      alias_usado: null,
      nota: null,
      _aliasOriginal: "",
      _aliasPendiente: false,
    };
    setItems(prev => {
      const next = [...prev, nuevoItem];
      setExpandedIdx(next.length - 1);
      return next;
    });
  };

  // Guardar alias
  const handleGuardarAlias = async (idx) => {
    const item = items[idx];
    try {
      const r = await callGuardarAlias(item._aliasOriginal, item.fragancia.trim(), item.producto);
      if (r?.guardado === false) {
        mostrarToast("⚠️ " + (r.mensaje || "Alias ya existente"), "error");
        return;
      }
      setItems(prev => prev.map((it, i) =>
        i === idx ? { ...it, flag: "OK", _aliasPendiente: false } : it
      ));
      mostrarToast("✅ \"" + item._aliasOriginal + "\" → \"" + item.fragancia.trim() + "\" guardado en diccionario");
    } catch(e) {
      mostrarToast("⚠️ Error: " + e.message, "error");
    }
  };

  // Confirmar pedido
  const confirmar = async () => {
    setConfirmando(true);
    try {
      await onConfirmar({ ...resultado, items, total_unidades: total });
      setConfirmado(true);
    } catch(e) {
      alert("Error al guardar en Sheets: " + e.message);
    } finally {
      setConfirmando(false);
    }
  };

  // Pantalla exito
  if(confirmado) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",minHeight:"70vh",padding:"0 24px",textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:16}}>✅</div>
      <h2 style={{fontSize:24,fontWeight:800,color:"#065f46",marginBottom:8}}>¡Pedido confirmado!</h2>
      <p style={{color:"#64748b",fontSize:15}}>{resultado.cliente_detectado} — {total} unidades</p>
      <p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>Guardado en Google Sheets</p>
      <button onClick={() => abrirWhatsApp(resultado.cliente_detectado, items)}
        style={{marginTop:28,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          background:"#25D366",color:"#fff",border:"none",borderRadius:14,
          padding:"14px 28px",fontSize:16,fontWeight:700,cursor:"pointer",
          fontFamily:"inherit",boxShadow:"0 4px 14px rgba(37,211,102,0.35)",width:"100%"}}>
        📲 Enviar resumen por WhatsApp
      </button>
    </div>
  );

  return (
    <div style={{padding:"0 16px 120px"}}>

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
          zIndex:999,maxWidth:360,width:"calc(100% - 32px)",
          background: toast.tipo==="error" ? "#fee2e2" : "#d1fae5",
          color:       toast.tipo==="error" ? "#991b1b" : "#065f46",
          border:"1.5px solid " + (toast.tipo==="error" ? "#fca5a5" : "#6ee7b7"),
          borderRadius:12,padding:"12px 16px",fontSize:13,fontWeight:700,
          boxShadow:"0 4px 20px rgba(0,0,0,0.15)",textAlign:"center"}}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 16px"}}>
        <button onClick={onBack} style={{background:"#f1f5f9",border:"none",borderRadius:10,
          width:36,height:36,cursor:"pointer",fontSize:18,
          display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:0}}>Resultado</h1>
          <p style={{fontSize:12,color:"#94a3b8",margin:0}}>Toca un item para editar · {total} u total</p>
        </div>
      </div>

      {/* Card cliente */}
      <Card style={{marginBottom:16,background:"#f0fdf4",border:"1.5px solid #bbf7d0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#166534",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>
              Cliente · Confianza {resultado.confianza_cliente}
            </div>
            <div style={{fontSize:18,fontWeight:800,color:"#0f172a",marginTop:2}}>
              {resultado.cliente_detectado}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{resultado.cliente_id}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:32,fontWeight:800,color:"#1e3a5f"}}>{total}</div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>UNIDADES</div>
          </div>
        </div>
        {resultado.notas_pedido && (
          <div style={{marginTop:10,padding:"8px 12px",background:"#fefce8",borderRadius:8,fontSize:12,color:"#92400e"}}>
            📝 {resultado.notas_pedido}
          </div>
        )}
      </Card>

      {/* Banner revision */}
      {itemsNuevos.length>0 && (
        <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:12,
          padding:"12px 14px",marginBottom:16,fontSize:13,color:"#9a3412"}}>
          ⚠️ <strong>{itemsNuevos.length} item{itemsNuevos.length>1?"s":""} para revisar:</strong>{" "}
          {resultado.items_a_revisar?.join(", ")}
        </div>
      )}

      <h3 style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>
        Items del pedido
      </h3>

      {/* ─── LISTA DE ITEMS ─── */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {items.map((item, idx) => {
          const fc = FLAG_CONFIG[item.flag] || FLAG_CONFIG.OK;
          const isExpanded = expandedIdx === idx;
          const prod = item.producto || "Aromatizador Textil 250ml";
          const ps = getProdStyle(prod);

          return (
            <div key={idx} style={{
              background:"#fff",
              borderRadius:12,
              boxShadow:"0 1px 3px rgba(0,0,0,0.07)",
              borderLeft:"4px solid " + fc.color,
              overflow:"hidden",
            }}>

              {/* ── FILA COLAPSADA (siempre visible) ── */}
              <div
                onClick={() => setExpandedIdx(isExpanded ? null : idx)}
                style={{
                  padding:"12px 14px",
                  display:"flex", alignItems:"center", gap:10,
                  cursor:"pointer",
                  background: isExpanded ? "#f8fafc" : "#fff",
                }}
              >
                {/* Badge flag */}
                <span style={{background:fc.bg, color:fc.color,
                  padding:"2px 7px", borderRadius:6, fontSize:10, fontWeight:700,
                  flexShrink:0, minWidth:50, textAlign:"center"}}>
                  {fc.label}
                </span>

                {/* Nombre + badge producto */}
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:700, fontSize:14, color:"#0f172a",
                    whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                    {item.fragancia || <em style={{color:"#94a3b8", fontStyle:"italic"}}>sin nombre...</em>}
                  </div>
                  <div style={{display:"inline-flex", alignItems:"center", gap:3,
                    background:ps.bg, color:ps.color, borderRadius:4,
                    padding:"1px 6px", fontSize:10, fontWeight:700, marginTop:2}}>
                    {ps.icon} {prod}
                  </div>
                </div>

                {/* Controles cantidad + eliminar — stopPropagation para no expandir */}
                <div style={{display:"flex", alignItems:"center", gap:5, flexShrink:0}}
                  onClick={e => e.stopPropagation()}>
                  <button onClick={() => cambiarCantidad(idx,-1)} style={{
                    width:28, height:28, borderRadius:8, border:"1.5px solid #e2e8f0",
                    background:"#f8fafc", cursor:"pointer", fontSize:16, fontWeight:700,
                    display:"flex", alignItems:"center", justifyContent:"center", color:"#374151"}}>−</button>
                  <span style={{fontWeight:800, fontSize:16, minWidth:24, textAlign:"center", color:"#0f172a"}}>
                    {item.cantidad}
                  </span>
                  <button onClick={() => cambiarCantidad(idx,1)} style={{
                    width:28, height:28, borderRadius:8, border:"1.5px solid #e2e8f0",
                    background:"#f8fafc", cursor:"pointer", fontSize:16, fontWeight:700,
                    display:"flex", alignItems:"center", justifyContent:"center", color:"#374151"}}>+</button>
                  <button onClick={e => { e.stopPropagation(); eliminar(idx); }} style={{
                    width:28, height:28, borderRadius:8, border:"none",
                    background:"#fee2e2", cursor:"pointer", fontSize:13,
                    display:"flex", alignItems:"center", justifyContent:"center", color:"#dc2626"}}>✕</button>
                </div>
              </div>

              {/* ── PANEL EXPANDIDO ── */}
              {isExpanded && (
                <div style={{
                  borderTop:"1px solid #f1f5f9",
                  padding:"14px",
                  background:"#fafafa",
                  display:"flex", flexDirection:"column", gap:12,
                }}>

                  {/* Fragancia */}
                  <div>
                    <label style={{fontSize:10, fontWeight:700, color:"#64748b",
                      textTransform:"uppercase", letterSpacing:0.6, display:"block", marginBottom:5}}>
                      Fragancia
                    </label>
                    <input
                      value={item.fragancia}
                      onChange={e => editarFragancia(idx, e.target.value)}
                      placeholder="Nombre de la fragancia"
                      style={{
                        width:"100%", padding:"9px 12px", borderRadius:8,
                        fontSize:14, fontWeight:700,
                        border:"1.5px solid #e2e8f0", background:"#fff", color:"#0f172a",
                        fontFamily:"inherit", boxSizing:"border-box", outline:"none",
                      }}
                    />
                    {item.alias_usado && (
                      <div style={{fontSize:10, color:"#94a3b8", marginTop:3}}>
                        alias detectado: "{item.alias_usado}"
                      </div>
                    )}
                    {item._aliasPendiente && (
                      <button onClick={() => handleGuardarAlias(idx)} style={{
                        marginTop:7, display:"inline-flex", alignItems:"center", gap:4,
                        background:"#fff7ed", border:"1.5px solid #f97316", color:"#c2410c",
                        borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700,
                        cursor:"pointer", fontFamily:"inherit"}}>
                        💾 Guardar alias "{item._aliasOriginal}"
                      </button>
                    )}
                  </div>

                  {/* Producto */}
                  <div>
                    <label style={{fontSize:10, fontWeight:700, color:"#64748b",
                      textTransform:"uppercase", letterSpacing:0.6, display:"block", marginBottom:5}}>
                      Producto
                    </label>
                    <select
                      value={PROD_CFG[prod] ? prod : PRODUCTOS_LIST[0]}
                      onChange={e => editarProducto(idx, e.target.value)}
                      style={{
                        width:"100%", padding:"9px 12px", borderRadius:8, fontSize:13, fontWeight:600,
                        border:"1.5px solid #e2e8f0", background:"#fff", color:"#0f172a",
                        fontFamily:"inherit", outline:"none",
                      }}
                    >
                      {PRODUCTOS_LIST.map(p => (
                        <option key={p} value={p}>{PROD_CFG[p].icon} {p}</option>
                      ))}
                    </select>
                  </div>

                  {/* Flag / Estado */}
                  <div>
                    <label style={{fontSize:10, fontWeight:700, color:"#64748b",
                      textTransform:"uppercase", letterSpacing:0.6, display:"block", marginBottom:5}}>
                      Estado
                    </label>
                    <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
                      {Object.entries(FLAG_CONFIG).map(([f, fc2]) => (
                        <button key={f} onClick={() => editarFlag(idx, f)} style={{
                          padding:"5px 13px", borderRadius:8, fontSize:11, fontWeight:700,
                          border:"1.5px solid " + (item.flag===f ? fc2.color : "#e2e8f0"),
                          background: item.flag===f ? fc2.bg   : "#f8fafc",
                          color:      item.flag===f ? fc2.color : "#94a3b8",
                          cursor:"pointer", fontFamily:"inherit", transition:"all 0.1s",
                        }}>{fc2.label}</button>
                      ))}
                    </div>
                  </div>

                  {/* Nota del parser */}
                  {item.nota && (
                    <div style={{fontSize:11, color:"#b45309",
                      padding:"6px 10px", background:"#fffbeb", borderRadius:6}}>
                      ⚠ {item.nota}
                    </div>
                  )}

                  {/* Boton cerrar */}
                  <button onClick={() => setExpandedIdx(null)} style={{
                    padding:"8px", borderRadius:8,
                    border:"1.5px solid #e2e8f0", background:"#fff",
                    color:"#64748b", fontSize:12, fontWeight:700,
                    cursor:"pointer", fontFamily:"inherit"}}>
                    ▲ Cerrar
                  </button>
                </div>
              )}
            </div>
          );
        })}

        {/* AGREGAR ITEM MANUAL */}
        <button onClick={agregarItem} style={{
          width:"100%", padding:"13px", borderRadius:12,
          border:"1.5px dashed #94a3b8", background:"#f8fafc",
          color:"#64748b", fontSize:13, fontWeight:700,
          cursor:"pointer", fontFamily:"inherit",
          display:"flex", alignItems:"center", justifyContent:"center", gap:6,
        }}>
          ＋ Agregar item manualmente
        </button>
      </div>

      {/* Botones confirmar / volver */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn onClick={confirmar} disabled={confirmando} variant="secondary">
          {confirmando ? "⏳ Guardando en Sheets..." : "✅ Confirmar (" + total + " unidades)"}
        </Btn>
        <Btn onClick={onBack} variant="ghost">← Volver a editar</Btn>
      </div>
    </div>
  );
}

// CONSOLIDADO
function ConsolidadoScreen({onBack}) {
  const [filtro, setFiltro]     = useState("semana");
  const [datos, setDatos]       = useState(null);
  const [cargando, setCargando] = useState(false);
  const [copiado, setCopiado]   = useState(false);
  const [error, setError]       = useState(null);

  function calcularFechas(f) {
    const hoy = new Date();
    const pad = n => String(n).padStart(2,"0");
    const fmt = d => d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
    const hasta = fmt(hoy);
    let desde;
    if (f === "hoy") { desde = hasta; }
    else if (f === "semana") { const d=new Date(hoy); d.setDate(hoy.getDate()-6); desde=fmt(d); }
    else { const d=new Date(hoy); d.setDate(1); desde=fmt(d); }
    return { desde, hasta };
  }

  async function cargarConsolidado(f) {
    setCargando(true); setError(null); setDatos(null);
    try {
      const { desde, hasta } = calcularFechas(f);
      const r = await callConsolidado(desde, hasta);
      if (!r || !r.items) throw new Error("Sin datos");
      setDatos(r);
    } catch(e) { setError("Error al cargar: " + e.message); }
    finally { setCargando(false); }
  }

  React.useEffect(() => { cargarConsolidado(filtro); }, []);
  const cambiarFiltro = (f) => { setFiltro(f); cargarConsolidado(f); };

  function agruparPorProducto(items) {
    const mapa = {};
    items.forEach(item => {
      const prod = item.producto || "Sin producto";
      if (!mapa[prod]) mapa[prod] = { producto: prod, total: 0, items: [] };
      mapa[prod].items.push(item);
      mapa[prod].total += item.cantidad;
    });
    return Object.values(mapa).sort((a,b) => b.total - a.total);
  }

  function generarTextoSheru(grupos) {
    let txt = "PEDIDO SHERU — CaribbeanSaphirus\n";
    txt += new Date().toLocaleDateString("es-AR") + "\n";
    txt += "═".repeat(40) + "\n\n";
    grupos.forEach(g => {
      txt += "📦 " + g.producto + " (" + g.total + " u)\n";
      g.items.forEach(i => {
        const flag = i.flag !== "OK" ? " ⚠️ " + i.flag : "";
        txt += "   " + i.fragancia.padEnd(25) + " " + String(i.cantidad).padStart(3) + " u" + flag + "\n";
      });
      txt += "\n";
    });
    txt += "═".repeat(40) + "\n";
    txt += "TOTAL: " + grupos.reduce((s,g)=>s+g.total,0) + " unidades\n";
    return txt;
  }

  function copiarAlPortapapeles(grupos) {
    const txt = generarTextoSheru(grupos);
    navigator.clipboard.writeText(txt).then(() => {
      setCopiado(true); setTimeout(() => setCopiado(false), 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      setCopiado(true); setTimeout(() => setCopiado(false), 2500);
    });
  }

  const grupos = datos?.items ? agruparPorProducto(datos.items) : [];
  const totalGeneral = grupos.reduce((s,g) => s+g.total, 0);
  const { desde, hasta } = calcularFechas(filtro);

  const FLAG_COLORS = {
    OK:     { bg:"#d1fae5", color:"#065f46" },
    NUEVA:  { bg:"#ffedd5", color:"#9a3412" },
    REVISAR:{ bg:"#fee2e2", color:"#991b1b" },
    QUEMA:  { bg:"#ede9fe", color:"#5b21b6" },
  };

  return (
    <div style={{padding:"0 16px 110px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"24px 0 16px"}}>
        <button onClick={onBack} style={{background:"#f1f5f9",border:"none",borderRadius:10,
          width:36,height:36,cursor:"pointer",fontSize:18,
          display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:0}}>Consolidado</h1>
          <p style={{fontSize:12,color:"#94a3b8",margin:0}}>Pedido total para Sheru</p>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,background:"#f1f5f9",borderRadius:12,padding:4}}>
        {[{id:"hoy",label:"Hoy"},{id:"semana",label:"Esta semana"},{id:"mes",label:"Este mes"}].map(f=>(
          <button key={f.id} onClick={()=>cambiarFiltro(f.id)} style={{
            flex:1,padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:700,
            background:filtro===f.id?"#fff":"transparent",
            color:filtro===f.id?"#1e3a5f":"#94a3b8",
            boxShadow:filtro===f.id?"0 1px 4px rgba(0,0,0,0.1)":"none",
            transition:"all 0.15s"}}>
            {f.label}
          </button>
        ))}
      </div>

      <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,textAlign:"center",marginBottom:16,letterSpacing:0.5}}>
        {desde === hasta ? desde : desde + "  →  " + hasta}
      </div>

      {cargando && (
        <div style={{textAlign:"center",padding:"48px 0",color:"#94a3b8"}}>
          <div style={{fontSize:36,marginBottom:12}}>⏳</div>
          <p style={{fontWeight:600}}>Cargando desde Sheets...</p>
        </div>
      )}

      {error && !cargando && (
        <div style={{background:"#fee2e2",border:"1.5px solid #fca5a5",borderRadius:12,
          padding:"16px",marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:24,marginBottom:8}}>⚠️</div>
          <p style={{color:"#991b1b",fontWeight:700,fontSize:14}}>{error}</p>
          <button onClick={()=>cargarConsolidado(filtro)} style={{
            marginTop:8,background:"#991b1b",color:"#fff",border:"none",
            borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>
            Reintentar
          </button>
        </div>
      )}

      {!cargando && !error && datos && grupos.length === 0 && (
        <div style={{textAlign:"center",padding:"48px 0",color:"#94a3b8"}}>
          <div style={{fontSize:48,marginBottom:12}}>📭</div>
          <p style={{fontWeight:700}}>Sin pedidos en este periodo</p>
          <p style={{fontSize:13}}>Confirma pedidos desde "Nuevo pedido"</p>
        </div>
      )}

      {!cargando && grupos.length > 0 && (
        <>
          <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d5986)",
            borderRadius:16,padding:"20px",marginBottom:20,
            display:"flex",justifyContent:"space-between",alignItems:"center",color:"#fff"}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,opacity:0.7,textTransform:"uppercase",letterSpacing:1}}>
                Total para Sheru
              </div>
              <div style={{fontSize:13,marginTop:4,opacity:0.85}}>
                {grupos.length} producto{grupos.length>1?"s":""} · {datos.desde} a {datos.hasta}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:42,fontWeight:800,lineHeight:1}}>{totalGeneral}</div>
              <div style={{fontSize:11,opacity:0.7,fontWeight:600}}>UNIDADES</div>
            </div>
          </div>

          <button onClick={()=>copiarAlPortapapeles(grupos)} style={{
            width:"100%",padding:"14px",borderRadius:12,border:"none",
            background:copiado?"#d1fae5":"#f97316",
            color:copiado?"#065f46":"#fff",
            fontWeight:800,fontSize:15,cursor:"pointer",
            marginBottom:20,transition:"all 0.2s",fontFamily:"inherit"}}>
            {copiado ? "✅ ¡Copiado! Pegalo donde necesites" : "📋 Copiar lista para Sheru"}
          </button>

          {grupos.map((grupo,gi) => (
            <div key={gi} style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                background:"#1e3a5f",color:"#fff",
                borderRadius:"12px 12px 0 0",padding:"12px 16px"}}>
                <span style={{fontWeight:700,fontSize:14}}>📦 {grupo.producto}</span>
                <span style={{background:"rgba(255,255,255,0.2)",
                  padding:"3px 10px",borderRadius:99,fontSize:13,fontWeight:800}}>
                  {grupo.total} u
                </span>
              </div>
              <div style={{background:"#fff",borderRadius:"0 0 12px 12px",
                boxShadow:"0 2px 8px rgba(0,0,0,0.07)",overflow:"hidden"}}>
                {grupo.items.sort((a,b)=>b.cantidad-a.cantidad).map((item,ii) => {
                  const fc = FLAG_COLORS[item.flag] || FLAG_COLORS.OK;
                  const isLast = ii === grupo.items.length-1;
                  return (
                    <div key={ii} style={{display:"flex",alignItems:"center",padding:"11px 16px",
                      borderBottom:isLast?"none":"1px solid #f1f5f9"}}>
                      <div style={{width:3,height:28,borderRadius:2,marginRight:12,flexShrink:0,
                        background:item.flag==="OK"?"#10b981":item.flag==="NUEVA"?"#f97316":
                                   item.flag==="REVISAR"?"#ef4444":"#8b5cf6"}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{item.fragancia}</span>
                        {item.flag !== "OK" && (
                          <span style={{...fc,marginLeft:8,padding:"1px 6px",borderRadius:5,fontSize:10,fontWeight:700}}>
                            {item.flag}
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:18,fontWeight:800,color:"#1e3a5f",minWidth:42,textAlign:"right"}}>
                        {item.cantidad}
                      </div>
                      <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginLeft:4}}>u</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

  const cargarPedidosDesdeSheets = async () => {
    try {
      const r = await callObtenerPedidos(false);
      if (r?.pedidos?.length > 0) {
        const mapped = r.pedidos
          .filter(p => p.ID_Pedido && p.Estado === 'CONFIRMADO')
          .map(p => ({
            id:              p.ID_Pedido || '',
            clienteId:       p.Cliente_ID || '',
            clienteNombre:   p.Cliente_Nombre || '',
            estado:          p.Estado || 'CONFIRMADO',
            totalUnidades:   parseInt(p.Total_Unidades) || 0,
            fecha:           p.Fecha ? new Date(p.Fecha).toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'}) : '',
            canal:           p.Canal || 'DIRECTO',
            requiereRevision: p.Requiere_Revision === 'SI',
            items:           Array.isArray(p.Items_JSON) ? p.Items_JSON : [],
          }))
          .sort((a,b) => b.id.localeCompare(a.id));
        setPedidos(mapped);
      }
    } catch(e) {
      console.warn('Error cargando pedidos:', e);
    }
  };

  useEffect(() => { cargarPedidosDesdeSheets(); }, []);

  const handleResultado = (r, c) => {
    setResultadoActual(r); setClienteActual(c); setPantalla("resultado");
  };

  const handleConfirmar = async (pf) => {

      requiereRevision: false, items: pf.items,

      await cargarPedidosDesdeSheets();
      setPantalla("home");

    {id:"consolidado", icon:"📊", label:"Sheru"},
    {id:"historial",   icon:"📋", label:"Historial"},

      <div style={{position:"sticky",top:0,zIndex:50,
        background:"rgba(248,250,252,0.94)",backdropFilter:"blur(12px)",
        borderBottom:"1px solid #f1f5f9",padding:"10px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,
            background:"linear-gradient(135deg,#1e3a5f,#f97316)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🌊</div>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:"#0f172a",lineHeight:1}}>Caribbean</div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>Saphirus · Pedidos</div>
          </div>
        </div>
        <div style={{background:"#f0fdf4",color:"#166534",padding:"4px 10px",
          borderRadius:99,fontSize:11,fontWeight:700}}>● En linea</div>
      </div>

      {pantalla==="home" && (
        <HomeScreen pedidos={pedidos} onNuevo={()=>setPantalla("nuevo")}
          onVerPedido={p=>{setResultadoActual({
            cliente_detectado:p.clienteNombre, cliente_id:p.clienteId,
            confianza_cliente:"ALTA", items:p.items,
            total_unidades:p.totalUnidades, items_a_revisar:[]
          });setPantalla("resultado");}}/>
      )}
      {pantalla==="nuevo" && (

              background:pantalla===item.id?"#fff7ed":"transparent",

    </div>
  );
}

// FINANZAS
async function cargarFinanzas(periodo, setFinData, setFinCargando) {
  setFinCargando(true);
  const hoy = new Date();
  let desde, hasta = hoy.toISOString().split('T')[0];
  if (periodo === 'hoy') { desde = hasta; }
  else if (periodo === 'semana') { const d = new Date(hoy); d.setDate(d.getDate() - 6); desde = d.toISOString().split('T')[0]; }
  else if (periodo === 'mes') { const d = new Date(hoy); d.setDate(1); desde = d.toISOString().split('T')[0]; }
  const url = APPS_SCRIPT_URL + '?datos=' + encodeURIComponent(JSON.stringify({accion:'obtenerFinanzas', desde, hasta}));
  try {
    const res = await fetch(url);
    const json = await res.json();
    setFinData(json);
  } catch(e) {
    setFinData({ error: 'Error de conexion' });
  } finally {
    setFinCargando(false);
  }
}

// PIN
function PinScreen({ pinInput, setPinInput, pinError, setPinError, onSuccess }) {
  const PIN_CORRECTO = '5415';
  const handleDigit = (d) => {
    if (pinInput.length >= 4) return;
    const nuevo = pinInput + d;
    setPinInput(nuevo);
    if (nuevo.length === 4) {
      if (nuevo === PIN_CORRECTO) { setPinError(false); onSuccess(); }
      else { setPinError(true); setTimeout(() => { setPinInput(''); setPinError(false); }, 900); }
    }
  };
  const handleBorrar = () => setPinInput(p => p.slice(0,-1));
  return (
    <div style={{minHeight:"80vh",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{fontSize:40,marginBottom:8}}>💰</div>
      <div style={{fontSize:18,fontWeight:800,color:"#0f172a",marginBottom:4}}>Finanzas</div>
      <div style={{fontSize:13,color:"#94a3b8",marginBottom:32}}>Ingresa tu PIN para continuar</div>
      <div style={{display:"flex",gap:16,marginBottom:32}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",
            background: i < pinInput.length ? (pinError ? '#ef4444' : '#16a34a') : '#e2e8f0',
            transition:"background 0.2s"}}/>
        ))}
      </div>
      {pinError && <div style={{color:"#ef4444",fontSize:13,fontWeight:700,marginBottom:12}}>PIN incorrecto</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:240}}>
        {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=>(
          <button key={i} onClick={()=> d==='' ? null : d==='⌫' ? handleBorrar() : handleDigit(String(d))}
            style={{padding:"18px 0",fontSize:20,fontWeight:700,borderRadius:14,
              border:"1.5px solid #e2e8f0",
              background: d==='' ? 'transparent' : '#fff',
              cursor: d==='' ? 'default' : 'pointer',color:"#0f172a",
              boxShadow: d==='' ? 'none' : "0 1px 4px rgba(0,0,0,0.06)",fontFamily:"inherit"}}>
            {d}
          </button>
        ))}
      </div>
    </div>
  );
}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
              {[
                {label:"Facturado",   value: fmt(r.total_venta),  color:"#0ea5e9", bg:"#f0f9ff"},
                {label:"Costo Sheru", value: fmt(r.total_costo),  color:"#f97316", bg:"#fff7ed"},
                {label:"Margen",      value: fmt(r.margen),        color:"#16a34a", bg:"#f0fdf4"},
                {label:"Pedidos",     value: r.pedidos_count,      color:"#7c3aed", bg:"#faf5ff"},
              ].map((c,i)=>(
                <div key={i} style={{background:c.bg,borderRadius:14,padding:"14px 16px"}}>
                  <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c.color}}>{c.value}</div>
                </div>
              ))}
            </div>
            <div style={{fontWeight:800,fontSize:14,color:"#0f172a",marginBottom:10}}>Por cliente</div>
            {data.por_cliente.length === 0
              ? <div style={{color:"#94a3b8",fontSize:13,marginBottom:20}}>Sin datos en este periodo</div>
              : data.por_cliente.map((c,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                  marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{c.nombre}</span>
                    <span style={{fontWeight:800,fontSize:14,color:"#0ea5e9"}}>{fmt(c.venta)}</span>
                  </div>
                  <div style={{display:"flex",gap:16,marginTop:4}}>
                    <span style={{fontSize:11,color:"#94a3b8"}}>Costo: {fmt(c.costo)}</span>
                    <span style={{fontSize:11,color:"#16a34a",fontWeight:700}}>Margen: {fmt(c.margen)}</span>
                    <span style={{fontSize:11,color:"#94a3b8"}}>{c.pedidos} ped.</span>
                  </div>
                </div>
              ))
            }
            <div style={{fontWeight:800,fontSize:14,color:"#0f172a",margin:"16px 0 10px"}}>Por producto</div>
            {data.por_producto.map((p,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",
                marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{p.producto}</span>
                  <span style={{fontWeight:800,fontSize:13,color:"#0ea5e9"}}>{fmt(p.venta)}</span>
                </div>
                <div style={{display:"flex",gap:16,marginTop:4}}>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{p.cantidad} u.</span>
                  <span style={{fontSize:11,color:"#16a34a",fontWeight:700}}>Margen: {fmt(p.margen)}</span>
                </div>
              </div>
            ))}
          </>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
